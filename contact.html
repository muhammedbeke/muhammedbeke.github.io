<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Detaylı İletişim Formu</title>
  
  <!-- Menü için gerekli fontlar eklendi -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* Menü için gerekli renk değişkenleri */
    :root {
      --cream: #f7f4ef;
      --ink: #1a1714;
      --ink-soft: #4a453f;
      --rust: #c0440a;
      --rust-light: #f5e8e0;
      --border: #e8e3db;
    }

    /* Genel Sayfa Ayarları */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f2f5;
      margin: 0; 
      padding: 80px 0 40px 0; /* Sabit menü üstte içerik kapatmasın diye padding-top eklendi */
    }

    /* --- Üst Menü (Navigasyon) Stilleri - YENİ TASARIM --- */
    nav {
      font-family: 'Outfit', sans-serif;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(247,244,239,0.9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 2.5rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-monogram {
      width: 32px; height: 32px;
      background: var(--ink);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--cream);
    }

    .nav-name {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--ink-soft);
    }

    .nav-links {
      display: flex;
      gap: 10px;
    }

    .nav-links a {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--ink-soft);
      text-decoration: none;
      padding: 0.35rem 0.7rem;
      border-radius: 5px;
      transition: color 0.15s, background 0.15s;
    }

    .nav-links a:hover {
      color: var(--rust);
      background: var(--rust-light);
    }

    @media (max-width: 768px) {
      nav { padding: 0 1rem; }
      .nav-name { display: none; }
      .nav-links { gap: 5px; }
      .nav-links a { font-size: 0.75rem; padding: 0.35rem 0.5rem; }
    }
    /* ------------------------------------- */

    /* Form Kapsayıcısı (Değiştirilmedi) */
    .contact-container {
      width: 600px;            
      margin: 0 auto; 
      padding: 36px 40px;      
      border: 1px solid #d0d5dd;   
      border-radius: 12px;   
      background-color: #ffffff;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    .contact-container h2 {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 0.92rem;
      font-weight: 600;
      color: #344054;
      margin-bottom: 6px;
    }

    input, select, textarea {
      width: 100%;          
      padding: 10px 14px;      
      margin-bottom: 20px;      
      border: 1px solid #cdd5e0;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #333;
      background-color: #f9fafb;
      box-sizing: border-box;  
      transition: border-color 0.2s;
      outline: none;
    }

    input::placeholder,
    textarea::placeholder {
      color: #adb5bd;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #4361ee;
      background-color: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    .option-group {
      background-color: #f4f6fb;
      border: 1px solid #dde3ef;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 20px;
    }

    .option-group label {
      font-weight: 400;
      color: #444;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      cursor: pointer;
    }

    .option-group label:last-child {
      margin-bottom: 0;
    }

    .option-group input[type="radio"],
    .option-group input[type="checkbox"] {
      width: auto;
      margin-bottom: 0;
      padding: 0;
      accent-color: #4361ee;
    }

    input[type="file"] {
      padding: 6px 10px;
      background-color: #fff;
      cursor: pointer;
    }

    .btn-submit {
      width: 48%;
      background-color: #2563eb; 
      border: none;              
      padding: 13px 24px;  
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .btn-submit:hover {
      background-color: #1d4ed8;
    }

    .btn-reset {
      width: 48%;
      background-color: #e63946;
      border: none;
      padding: 13px 24px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
      margin-bottom: 0;
    }

    .btn-reset:hover {
      background-color: #c1121f;
    }

    .btn-row {
      display: flex;
      gap: 16px;
      margin-top: 4px;
    }

    .field-label {
      display: block;
      font-size: 0.92rem;
      font-weight: 600;
      color: #344054;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>

  <!-- Yeni Navigasyon Menüsü -->
  <nav>
    <a href="index.html" class="nav-brand">
        <div class="nav-monogram">ME</div>
        <span class="nav-name">Muhammed Emin Beke</span>
    </a>
    <div class="nav-links">
        <a href="index.html">Ana Sayfa</a>
        <a href="about.html">Hakkında</a>
        <a href="interests.html">İlgi Alanlarım</a>
    </div>
  </nav>

  <div class="contact-container">
    <h2>Detaylı İletişim Formu</h2>

    <form>

      <label for="adSoyad">Ad Soyad:</label>
      <input type="text" id="adSoyad" name="adSoyad" placeholder="Muhammed Emin Beke" required/>

      <label for="eposta">E-posta Adresi:</label>
      <input type="email" id="eposta" name="eposta" placeholder="ornek@mail.com" required />

      <label for="sifre">Başvuru Takip Şifresi:</label>
      <input type="password" id="sifre" name="sifre" placeholder="Şifrenizi girin" />

      <span class="field-label">İletişim Tercihi:</span>
      <div class="option-group">
        <label>
          <input type="radio" name="iletisim" value="eposta" checked />
          Bana e-posta ile ulaşın
        </label>
        <label>
          <input type="radio" name="iletisim" value="telefon" />
          Bana telefonla ulaşın
        </label>
      </div>

      <span class="field-label">İlgi Alanları / Yetenekler:</span>
      <div class="option-group">
        <label><input type="checkbox" name="beceri" value="html" /> HTML</label>
        <label><input type="checkbox" name="beceri" value="css" /> CSS</label>
        <label><input type="checkbox" name="beceri" value="algoritma" /> Algoritma</label>
      </div>

      <label for="konu">Konu:</label>
      <select id="konu" name="konu">
        <option value="">Lütfen bir konu seçin...</option>
        <option value="is-teklifi">İş Teklifi</option>
        <option value="soru">Soru</option>
        <option value="geri-bildirim">Geri Bildirim</option>
      </select>

      <label for="dosya">Özgeçmiş (CV) veya Fotoğraf Yükle:</label>
      <input type="file" id="dosya" name="dosya" accept=".pdf,.jpg,.png,.doc,.docx" />

      <label for="mesaj">Mesajınız:</label>
      <textarea id="mesaj" name="mesaj" placeholder="Detaylı mesajınızı buraya yazabilirsiniz..."></textarea>

      <div class="btn-row">
        <button type="submit" class="btn-submit">Gönder</button>
        <button type="reset" class="btn-reset">Temizle</button>
      </div>

    </form>
  </div>

</body>
</html>
