<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>LAB - Position</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f0f0f3;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Üst başlık */
    .header {
      position: fixed;
      top: 20px;
      left: 20px;
      background: #4a6cf7;
      color: white;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    .header:hover {
      background: #2f4ed8;
      top: 10px;
    }

    /* Kart kapsayıcı */
    .card {
      position: relative;
      margin-top: 120px;
      width: 400px;
      height: 300px;
      background: linear-gradient(135deg, #cfd9ff, #e2c6ff);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    /* Başlık */
    .card h2 {
      margin: 0;
    }

    .card p {
      font-size: 14px;
      color: #333;
    }

    /* Absolute etiketler */
    .tag {
      position: absolute;
      padding: 5px 10px;
      border-radius: 10px;
      font-size: 12px;
      cursor: pointer;
      transition: 0.3s;
    }

    .tag:hover {
      transform: scale(1.1);
    }

    .date {
      top: 15px;
      right: 15px;
      background: #b8f2c2;
    }

    .free {
      top: 15px;
      left: 15px;
      background: #ffe6a7;
    }

    .location {
      bottom: 80px;
      right: 40px;
      background: white;
      z-index: 2;
    }

    .deadline {
      bottom: 20px;
      right: 20px;
      background: #ffd6d6;
       animation: float 3s infinite ease-in-out;
    }

    /* Arka dekor */
    .circle {
      position: absolute;
      width: 150px;
      height: 150px;
      background: rgba(255,255,255,0.4);
      border-radius: 50%;
      right: 20px;
      bottom: 20px;
      z-index: 1;
     
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }

    /* Sabit buton */
    .fixed-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #6c4af7;
      color: white;
      padding: 12px 18px;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.3s;
    }

    .fixed-btn:hover {
      background: #4b2fd8;
      transform: scale(1.1);
    }

    /* Footer */
    .footer {
      margin-top: 50px;
      font-size: 12px;
      color: gray;
    }
  </style>
</head>
<body>

  <div class="header">Ana Sayfaya Dön</div>

  <div class="card">
    <div class="tag free">Ücretsiz</div>
    <div class="tag date">24 Nisan</div>

    <h2>Teknoloji Topluluğu Etkinliği</h2>
    <p>
      Bu etkinlikte CSS position özelliklerini öğrenerek
      modern arayüzler tasarlamayı keşfedeceksiniz.
    </p>

    <div class="tag location">Konum: Konferans Salonu</div>
    <div class="tag deadline">Son Kayıt</div>

    <div class="circle"></div>
  </div>

  <div class="footer">2026 - LAB Position Ödevi</div>

  <div class="fixed-btn">Yardımcı Menü</div>

</body>
</html>
