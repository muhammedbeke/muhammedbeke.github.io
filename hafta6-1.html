<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Öğrenci Not Hesaplama</title>

    <!-- Menü için gerekli fontlar eklendi -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* Menü için gerekli renk değişkenleri */
        :root {
            --cream: #f7f4ef;
            --ink: #1a1714;
            --ink-soft: #4a453f;
            --rust: #c0440a;
            --rust-light: #f5e8e0;
            --border: #e8e3db;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            margin: 0;
            padding: 100px 0 40px 0; /* Sabit menüden dolayı içerik aşağı itildi */
        }

        /* --- Üst Menü (Navigasyon) Stilleri - YENİ TASARIM --- */
        nav {
            font-family: 'Outfit', sans-serif;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            background: rgba(247,244,239,0.9);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 0 2.5rem;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .nav-monogram {
            width: 32px; height: 32px;
            background: var(--ink);
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--cream);
        }

        .nav-name {
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--ink-soft);
        }

        .nav-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-links a {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--ink-soft);
            text-decoration: none;
            padding: 0.35rem 0.7rem;
            border-radius: 5px;
            transition: color 0.15s, background 0.15s;
        }

        .nav-links a:hover {
            color: var(--rust);
            background: var(--rust-light);
        }

        @media (max-width: 768px) {
            nav { padding: 0 1rem; }
            .nav-name { display: none; }
            .nav-links { gap: 5px; }
            .nav-links a { font-size: 0.75rem; padding: 0.35rem 0.5rem; }
        }
        /* ------------------------------------- */

        /* İçerik Stilleri (Değiştirilmedi) */
        .container {
            width: 400px;
            margin: 0 auto; 
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box; 
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #eee;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    
    <!-- Yeni Navigasyon Menüsü -->
    <nav>
        <a href="index.html" class="nav-brand">
            <div class="nav-monogram">ME</div>
            <span class="nav-name">Muhammed Emin Beke</span>
        </a>
        <div class="nav-links">
            <a href="index.html">Ana Sayfa</a>
            <a href="about.html">Hakkımda</a>
            <a href="interests.html">İlgi Alanlarım</a>
            <a href="contact.html">İletişim</a>
            <a href="hafta6-1.html">Uygulama 1</a>
            <a href="hafta6-2.html">Uygulama 2</a>
        </div>
    </nav>

<div class="container">
    <h2>Öğrenci Not Hesaplama</h2>

    <input type="text" id="ad" placeholder="Ad Soyad">
    <input type="number" id="vize" placeholder="Vize Notu">
    <input type="number" id="final" placeholder="Final Notu">

    <button onclick="hesapla()">Hesapla</button>

    <div class="result" id="sonuc"></div>
</div>

<script>
function harfNotuHesapla(ortalama) {
    if (ortalama >= 90) return "AA";
    else if (ortalama >= 85) return "BA";
    else if (ortalama >= 80) return "BB";
    else if (ortalama >= 75) return "CB";
    else if (ortalama >= 70) return "CC";
    else if (ortalama >= 65) return "DC";
    else if (ortalama >= 60) return "DD";
    else if (ortalama >= 50) return "FD";
    else return "FF";
}

function hesapla() {
    let ad = document.getElementById("ad").value;
    let vize = parseFloat(document.getElementById("vize").value);
    let final = parseFloat(document.getElementById("final").value);

    if (!ad || isNaN(vize) || isNaN(final)) {
        alert("Lütfen tüm alanları doldurun!");
        return;
    }

    let ortalama = (vize * 0.4) + (final * 0.6);
    let harf = harfNotuHesapla(ortalama);
    let durum = ortalama >= 50 ? "Geçti" : "Kaldı";

    document.getElementById("sonuc").innerHTML = `
        <strong>${ad}</strong><br>
        Ortalama: ${ortalama.toFixed(2)}<br>
        Harf Notu: ${harf}<br>
        Durum: ${durum}
    `;
}
</script>

</body>
</html>
