<div class="container">
    <h2>Öğrenci Not Hesaplama</h2>

    <input type="text" id="ad" placeholder="Ad Soyad">
    <input type="number" id="vize" placeholder="Vize Notu">
    <input type="number" id="final" placeholder="Final Notu">

    <button onclick="hesapla()">Hesapla</button>

    <div class="result" id="sonuc"></div>
</div>

<script>
function harfNotuHesapla(ortalama) {
    if (ortalama >= 90) return "AA";
    else if (ortalama >= 85) return "BA";
    else if (ortalama >= 80) return "BB";
    else if (ortalama >= 75) return "CB";
    else if (ortalama >= 70) return "CC";
    else if (ortalama >= 65) return "DC";
    else if (ortalama >= 60) return "DD";
    else if (ortalama >= 50) return "FD";
    else return "FF";
}

function hesapla() {
    let ad = document.getElementById("ad").value;
    let vize = parseFloat(document.getElementById("vize").value);
    let final = parseFloat(document.getElementById("final").value);

    if (!ad || isNaN(vize) || isNaN(final)) {
        alert("Lütfen tüm alanları doldurun!");
        return;
    }

    let ortalama = (vize * 0.4) + (final * 0.6);
    let harf = harfNotuHesapla(ortalama);
    let durum = ortalama >= 50 ? "Geçti" : "Kaldı";

    document.getElementById("sonuc").innerHTML = `
        <strong>${ad}</strong><br>
        Ortalama: ${ortalama.toFixed(2)}<br>
        Harf Notu: ${harf}<br>
        Durum: ${durum}
    `;
}
</script>
