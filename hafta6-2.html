<div class="container">
    <h2>Birim Dönüştürücü</h2>

    <label>Değer Giriniz:</label>
    <input type="number" id="deger" placeholder="Örn: 50">

    <label>Dönüşüm Tipi:</label>
    <select id="donusum">
        <option value="cf">Celsius → Fahrenheit</option>
        <option value="fc">Fahrenheit → Celsius</option>
        <option value="mk">Metre → Kilometre</option>
        <option value="km">Kilometre → Metre</option>
        <option value="kg">Kilogram → Gram</option>
        <option value="gk">Gram → Kilogram</option>
    </select>

    <button onclick="donustur()">Hesapla</button>

    <div class="result" id="sonuc">Sonuç: -</div>
</div>

<script>
function donustur() {
    let deger = parseFloat(document.getElementById("deger").value);
    let tip = document.getElementById("donusum").value;
    let sonuc;

    if (isNaN(deger)) {
        alert("Lütfen geçerli bir sayı giriniz!");
        return;
    }

    switch (tip) {
        case "cf":
            sonuc = (deger * 9/5) + 32;
            break;
        case "fc":
            sonuc = (deger - 32) * 5/9;
            break;
        case "mk":
            sonuc = deger / 1000;
            break;
        case "km":
            sonuc = deger * 1000;
            break;
        case "kg":
            sonuc = deger * 1000;
            break;
        case "gk":
            sonuc = deger / 1000;
            break;
    }

    document.getElementById("sonuc").innerText = "Sonuç: " + sonuc.toFixed(3);
}
</script>

</body>
