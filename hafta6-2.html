<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Birim Dönüştürücü</title>
    <!-- Menü için gerekli fontlar eklendi -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Menü için gerekli renk değişkenleri */
        :root {
            --cream: #f7f4ef;
            --ink: #1a1714;
            --ink-soft: #4a453f;
            --rust: #c0440a;
            --rust-light: #f5e8e0;
            --border: #e8e3db;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            padding: 0 0 40px 0; /* Menü için padding ayarlandı */
            margin: 0;
        }

        /* --- Üst Menü (Navigasyon) Stilleri - YENİ TASARIM --- */
        nav {
            font-family: 'Outfit', sans-serif;
            background: rgba(247,244,239,0.9);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 0 2.5rem;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px; /* İçerik ile arasına boşluk bırakmak için eklendi */
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .nav-monogram {
            width: 32px; height: 32px;
            background: var(--ink);
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--cream);
        }

        .nav-name {
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--ink-soft);
        }

        .nav-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-links a {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--ink-soft);
            text-decoration: none;
            padding: 0.35rem 0.7rem;
            border-radius: 5px;
            transition: color 0.15s, background 0.15s;
        }

        .nav-links a:hover {
            color: var(--rust);
            background: var(--rust-light);
        }

        @media (max-width: 768px) {
            nav { padding: 0 1rem; }
            .nav-name { display: none; }
            .nav-links { gap: 5px; }
            .nav-links a { font-size: 0.75rem; padding: 0.35rem 0.5rem; }
        }
        /* ------------------------------------- */

        .container {
            width: 400px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        input, select, button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box; /* Padding'in genişliği etkilememesi için eklendi */
        }

        button {
            background: #1e73d8;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #155ab6;
        }

        .result {
            margin-top: 15px;
            padding: 10px;
            background: #cfe8d5;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-brand">
            <div class="nav-monogram">ME</div>
            <span class="nav-name">Muhammed Emin Beke</span>
        </a>
        <div class="nav-links">
            <a href="index.html">Ana Sayfa</a>
            <a href="about.html">Hakkımda</a>
            <a href="interests.html">İlgi Alanlarım</a>
            <a href="contact.html">İletişim</a>
            <a href="hafta6-1.html">Uygulama 1</a>
            <a href="hafta6-2.html">Uygulama 2</a>
        </div>
    </nav>

<div class="container">
    <h2>Birim Dönüştürücü</h2>

    <label>Değer Giriniz:</label>
    <input type="number" id="deger" placeholder="Örn: 50">

    <label>Dönüşüm Tipi:</label>
    <select id="donusum">
        <option value="cf">Celsius → Fahrenheit</option>
        <option value="fc">Fahrenheit → Celsius</option>
        <option value="mk">Metre → Kilometre</option>
        <option value="km">Kilometre → Metre</option>
        <option value="kg">Kilogram → Gram</option>
        <option value="gk">Gram → Kilogram</option>
    </select>

    <button onclick="donustur()">Hesapla</button>

    <div class="result" id="sonuc">Sonuç: -</div>
</div>

<script>
function donustur() {
    let deger = parseFloat(document.getElementById("deger").value);
    let tip = document.getElementById("donusum").value;
    let sonuc;

    if (isNaN(deger)) {
        alert("Lütfen geçerli bir sayı giriniz!");
        return;
    }

    switch (tip) {
        case "cf":
            sonuc = (deger * 9/5) + 32;
            break;
        case "fc":
            sonuc = (deger - 32) * 5/9;
            break;
        case "mk":
            sonuc = deger / 1000;
            break;
        case "km":
            sonuc = deger * 1000;
            break;
        case "kg":
            sonuc = deger * 1000;
            break;
        case "gk":
            sonuc = deger / 1000;
            break;
    }

    document.getElementById("sonuc").innerText = "Sonuç: " + sonuc.toFixed(3);
}
</script>

</body>
</html>
